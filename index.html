<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zimbabwe Disability Sound Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0ede6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1rem 3rem;
    }

    .page-header {
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: #1a1a18;
      letter-spacing: 0.01em;
    }

    .page-header p {
      font-size: 14px;
      color: #666;
      margin-top: 6px;
    }

    .map-container {
      position: relative;
      width: 100%;
      max-width: 820px;
      margin: 1.2rem auto 0;
    }

    svg.zim-map {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
      overflow: visible;
    }

    .zone { cursor: pointer; }
    .zone-area {
      fill: transparent;
      stroke: transparent;
      transition: fill 0.2s, stroke 0.2s;
    }
    .zone:hover .zone-area {
      fill: rgba(255, 180, 0, 0.14);
      stroke: rgba(226, 106, 18, 0.5);
      stroke-width: 2;
    }
    .zone.active .zone-area {
      fill: rgba(226, 106, 18, 0.16);
      stroke: rgba(226, 106, 18, 0.65);
      stroke-width: 2.5;
    }

    .popup { opacity: 0; pointer-events: none; transition: opacity 0.18s ease; }
    .zone:hover .popup,
    .zone.active .popup { opacity: 1; pointer-events: all; }

    .listen-btn { cursor: pointer; }
    .listen-btn rect { transition: fill 0.15s; }
    .listen-btn:hover rect { fill: #c45a0a !important; }
    .listen-btn.playing rect { fill: #1a7a4a !important; }

    .audio-panel {
      display: none;
      background: #ffffff;
      border: 1px solid #e0ddd5;
      border-radius: 12px;
      padding: 1.1rem 1.4rem;
      margin-top: 1.2rem;
      max-width: 820px;
      width: 100%;
    }
    .audio-panel.visible { display: block; }

    .audio-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .audio-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #1a7a4a;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .audio-dot.idle { background: #bbb; }
    .audio-name {
      font-size: 15px;
      font-weight: 500;
      color: #1a1a18;
    }
    .audio-theme {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    .progress-bar-wrap {
      background: #ede9e0;
      border-radius: 4px;
      height: 5px;
      width: 100%;
      margin: 0 0 10px;
      overflow: hidden;
      cursor: pointer;
    }
    .progress-bar {
      height: 5px;
      width: 0%;
      background: #E26A12;
      border-radius: 4px;
      transition: width 0.4s linear;
    }

    .audio-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .play-btn-ui {
      background: #E26A12;
      border: none;
      color: #fff;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .play-btn-ui:hover { background: #c45a0a; }
    .play-btn-ui.playing { background: #1a7a4a; }

    .audio-time {
      font-size: 13px;
      color: #777;
      font-variant-numeric: tabular-nums;
    }

    .audio-note {
      font-size: 12.5px;
      color: #999;
      margin-top: 10px;
      font-style: italic;
      line-height: 1.5;
    }

    /* ── HOW TO ADD AUDIO ── */
    .audio-file-hint {
      font-size: 12px;
      color: #b07040;
      background: #fdf3e8;
      border: 1px solid #f0d0a0;
      border-radius: 8px;
      padding: 8px 12px;
      margin-top: 10px;
      line-height: 1.5;
    }
    .audio-file-hint code {
      font-family: monospace;
      background: #f5e8d0;
      padding: 1px 4px;
      border-radius: 3px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 20px;
      max-width: 820px;
      width: 100%;
      margin-top: 1.2rem;
      padding: 0.9rem 1.1rem;
      background: #fff;
      border: 1px solid #e0ddd5;
      border-radius: 10px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12.5px;
      color: #444;
    }
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>

<!-- Audio playback panel -->
<div class="audio-panel" id="audio-panel">
  <div class="audio-header">
    <div class="audio-dot idle" id="audio-dot"></div>
    <div>
      <div class="audio-name" id="audio-name">—</div>
      <div class="audio-theme" id="audio-theme"></div>
    </div>
  </div>
  <div class="progress-bar-wrap" id="progress-wrap" onclick="seekAudio(event)">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <div class="audio-controls">
    <button class="play-btn-ui" id="play-btn-ui" onclick="uiTogglePlay()" aria-label="Play or pause">▶</button>
    <span class="audio-time" id="audio-time-display">0:00 / 0:00</span>
  </div>
  <p class="audio-note" id="audio-note"></p>
  <div class="audio-file-hint" id="audio-file-hint"></div>
</div>

<!-- Legend -->
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#2a8a42"></div> Binga — Epistemic Injustice</div>
  <div class="legend-item"><div class="legend-dot" style="background:#d42020"></div> Harare — Language Barriers</div>
  <div class="legend-item"><div class="legend-dot" style="background:#7a44bb"></div> Epworth — Financial Exclusion</div>
  <div class="legend-item"><div class="legend-dot" style="background:#2055aa"></div> Makokoba — Disability Justice</div>
  <div class="legend-item"><div class="legend-dot" style="background:#cc8800"></div> Mutare — School Exclusion</div>
</div>

<script>
  /*
   * ─────────────────────────────────────────────────────────────────
   *  AUDIO CONFIGURATION
   *
   *  To add real audio files, set the `src` field for each zone
   *  to the path or URL of your audio file, e.g.:
   *    src: 'audio/binga.mp3'
   *    src: 'https://example.com/audio/harare.ogg'
   *
   *  Leave src as '' to keep the tone-preview placeholder.
   * ─────────────────────────────────────────────────────────────────
   */
  const zones = {
    binga: {
      name:  'Binga District',
      theme: 'Epistemic Injustice',
      note:  'Community voices from Binga on being dismissed and disbelieved in healthcare settings.',
      src:   'zone1.mp3'   // e.g. 'audio/binga.mp3'
    },
    harare: {
      name:  'Harare Central Hospital',
      theme: 'Language Barriers',
      note:  'Patients with hearing impairments navigating a hospital with no sign-language support.',
      src:   'zone2.mp3'
    },
    epworth: {
      name:  'Epworth (Peri-Urban)',
      theme: 'Financial Exclusion',
      note:  'Residents with disabilities on mobile money barriers and inaccessible financial services.',
      src:   'zone3.mp3'
    },
    makokoba: {
      name:  'Makokoba, Bulawayo',
      theme: 'Disability Justice',
      note:  'Stories from Makokoba on wheelchair access, employment discrimination, and community activism.',
      src:   'zone4.mp3'
    },
    mutare: {
      name:  'Mutare (Manicaland)',
      theme: 'School Exclusion',
      note:  'Children with disabilities on being turned away from schools in Manicaland.',
      src:   'zone5.mp3'
    }
  };

  /* ── State ── */
  let current   = null;
  let playing   = false;
  let elapsed   = 0;
  let duration  = 0;
  let ticker    = null;
  let audioEl   = null;   // <audio> element when a real file is loaded
  let synthCtx  = null;   // Web Audio context for tone fallback

  /* ── Zone click (highlights active zone) ── */
  function handleZoneClick(id) {
    document.querySelectorAll('.zone').forEach(z => z.classList.remove('active'));
    document.getElementById('zone-' + id).classList.add('active');
  }

  /* ── Listen button toggle ── */
  function toggleAudio(id, evt) {
    evt.stopPropagation();
    if (current === id && playing) { pauseAudio(); return; }
    if (current !== id) { stopAudio(); current = id; elapsed = 0; }
    startAudio();
  }

  /* ── Start playback ── */
  function startAudio() {
    const z = zones[current];
    playing = true;

    updatePanel(z);
    document.getElementById('audio-panel').classList.add('visible');
    document.getElementById('audio-dot').classList.remove('idle');
    document.getElementById('play-btn-ui').textContent = '⏸';
    document.getElementById('play-btn-ui').classList.add('playing');
    updateListenButtons();

    if (z.src) {
      /* ── Real audio file ── */
      if (!audioEl || audioEl.dataset.zone !== current) {
        if (audioEl) audioEl.pause();
        audioEl = new Audio(z.src);
        audioEl.dataset.zone = current;
        audioEl.addEventListener('loadedmetadata', () => { duration = audioEl.duration; updateDisplay(); });
        audioEl.addEventListener('timeupdate', () => { elapsed = audioEl.currentTime; updateDisplay(); });
        audioEl.addEventListener('ended', () => { elapsed = duration; playing = false; updateDisplay(); resetPlayButton(); });
      }
      audioEl.currentTime = elapsed;
      audioEl.play().catch(console.warn);
    } else {
      /* ── Tone preview fallback ── */
      duration = 120;
      playToneFeedback();
      clearInterval(ticker);
      ticker = setInterval(() => {
        elapsed += 0.5;
        if (elapsed >= duration) { elapsed = duration; pauseAudio(); }
        updateDisplay();
      }, 500);
      updateDisplay();
    }
  }

  /* ── Pause ── */
  function pauseAudio() {
    playing = false;
    clearInterval(ticker);
    if (audioEl && audioEl.dataset.zone === current) audioEl.pause();
    document.getElementById('audio-dot').classList.add('idle');
    resetPlayButton();
    updateListenButtons();
  }

  /* ── Stop completely ── */
  function stopAudio() {
    pauseAudio();
    elapsed = 0;
    if (audioEl) { audioEl.pause(); audioEl.currentTime = 0; }
  }

  /* ── UI play/pause button ── */
  function uiTogglePlay() {
    if (!current) return;
    playing ? pauseAudio() : startAudio();
  }

  /* ── Click on progress bar to seek ── */
  function seekAudio(evt) {
    if (!current || !duration) return;
    const wrap = document.getElementById('progress-wrap');
    const ratio = Math.min(1, Math.max(0, evt.offsetX / wrap.offsetWidth));
    elapsed = ratio * duration;
    if (audioEl && audioEl.dataset.zone === current) audioEl.currentTime = elapsed;
    updateDisplay();
  }

  /* ── Update audio panel content ── */
  function updatePanel(z) {
    document.getElementById('audio-name').textContent  = z.name;
    document.getElementById('audio-theme').textContent = z.theme;
    document.getElementById('audio-note').textContent  = z.note;
    const hint = document.getElementById('audio-file-hint');
    if (!z.src) {
      hint.innerHTML = '⚠ No audio file linked yet. To add audio, open this HTML file and set '
        + '<code>src: \'your-file.mp3\'</code> for <strong>' + z.name + '</strong> in the zones config.';
    } else {
      hint.innerHTML = '';
    }
  }

  /* ── Update progress bar and time display ── */
  function updateDisplay() {
    const pct = duration > 0 ? Math.min(100, (elapsed / duration) * 100) : 0;
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('audio-time-display').textContent = fmt(elapsed) + ' / ' + fmt(duration);
  }

  /* ── Reset play button to paused state ── */
  function resetPlayButton() {
    document.getElementById('play-btn-ui').textContent = '▶';
    document.getElementById('play-btn-ui').classList.remove('playing');
  }

  /* ── Keep SVG listen buttons in sync ── */
  function updateListenButtons() {
    ['binga','harare','epworth','makokoba','mutare'].forEach(id => {
      const btn = document.getElementById('btn-' + id);
      if (!btn) return;
      if (id === current && playing) btn.classList.add('playing');
      else btn.classList.remove('playing');
    });
  }

  /* ── Format seconds → m:ss ── */
  function fmt(s) {
    s = Math.floor(s || 0);
    return Math.floor(s / 60) + ':' + (s % 60 < 10 ? '0' : '') + (s % 60);
  }

  /* ── Tone preview using Web Audio API ── */
  function playToneFeedback() {
    try {
      if (!synthCtx) synthCtx = new (window.AudioContext || window.webkitAudioContext)();
      [440, 523, 659, 784].forEach((freq, i) => {
        const osc  = synthCtx.createOscillator();
        const gain = synthCtx.createGain();
        osc.connect(gain);
        gain.connect(synthCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, synthCtx.currentTime + i * 0.13);
        gain.gain.setValueAtTime(0, synthCtx.currentTime + i * 0.13);
        gain.gain.linearRampToValueAtTime(0.07, synthCtx.currentTime + i * 0.13 + 0.05);
        gain.gain.linearRampToValueAtTime(0, synthCtx.currentTime + i * 0.13 + 0.2);
        osc.start(synthCtx.currentTime + i * 0.13);
        osc.stop(synthCtx.currentTime + i * 0.13 + 0.25);
      });
    } catch (e) { /* audio not supported */ }
  }
</script>
